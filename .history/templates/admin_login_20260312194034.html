<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - ARCSYS</title>
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 20% 20%, #1b2a3b 0%, #0e1621 45%, #0b131d 100%);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            background: #17212b;
            border: 1px solid #26384a;
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.35);
        }
        .titulo {
            margin: 0 0 8px 0;
            color: #5288c1;
            font-size: 1.8em;
            letter-spacing: 0.5px;
        }
        .sub {
            margin: 0 0 20px 0;
            color: #9cb1c7;
            font-size: 0.9em;
        }
        label {
            display: block;
            color: #c5d6e7;
            font-size: 0.85em;
            margin-bottom: 7px;
            font-weight: 700;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        input[type="password"] {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #2f4559;
            border-radius: 9px;
            background: #0f1a25;
            color: #fff;
            padding: 12px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        input[type="password"]:focus {
            border-color: #5288c1;
            box-shadow: 0 0 0 3px rgba(82, 136, 193, 0.2);
        }
        .btn {
            margin-top: 16px;
            width: 100%;
            border: 0;
            border-radius: 9px;
            padding: 12px;
            font-size: 0.95em;
            font-weight: 800;
            cursor: pointer;
            background: #5288c1;
            color: #fff;
            transition: filter 0.2s ease;
        }
        .btn:hover { filter: brightness(1.08); }
        .erro {
            margin-bottom: 14px;
            background: rgba(231, 76, 60, 0.12);
            border: 1px solid rgba(231, 76, 60, 0.35);
            color: #ffbdb6;
            border-radius: 8px;
            padding: 9px 10px;
            font-size: 0.85em;
        }
    </style>
</head>
<body>
    <form class="login-card" method="post" action="/admin/login">
        <h1 class="titulo">Admin ARCSYS</h1>
        <p class="sub">Autenticação protegida por cookie seguro.</p>

        {% if erro %}
            <div class="erro">{{ erro }}</div>
        {% endif %}

        <label for="token">Token de Acesso</label>
        <input id="token" name="token" type="password" autocomplete="current-password" required>

        <button class="btn" type="submit">Entrar no Painel</button>
    </form>
</body>
</html>
