{% extends "base.html" %}

{% block content %}

<div class="module-nav-header">
    <a href="/" class="btn-voltar-static">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Dashboard
    </a>
    <div id="dynamic-actions"></div>
</div>

<div class="module-header">
    <h2>✂️ SEPARADOR DE CPF COMUM</h2>
    <p>Extraia, limpe e valide CPFs de listas ou textos desorganizados</p>
</div>

<div id="areaExtracao">
    
    <div id="boxInput">
        <textarea id="textoEntrada" class="separador-textarea" placeholder="Cole o texto sujo aqui... (Pode ter milhares de linhas, letras, símbolos, etc)" rows="12"></textarea>
        
        <button id="btnExtrair" class="btn-extrair" onclick="processarCPFs()">
            Extrair e Limpar CPFs
        </button>
    </div>

    <div id="boxResultado">
        <div class="resultado-header">
            <span id="contadorResultados" class="badge-contador">
                0 CPFs extraídos
            </span>
            <span class="texto-duplicatas">Duplicatas removidas</span>
        </div>
        
        <textarea id="textoSaida" class="separador-textarea-saida" rows="12" readonly></textarea>
        
        <div class="separador-acoes">
            <button class="btn-nova-extracao" onclick="limparTudo()">🗑️ Nova Extração</button>
        </div>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/separador.js?v=117.0"></script>
{% endblock %}
