{% extends "base.html" %}

{% block content %}
<div class="module-header">
    <h2>📸 SIMILAR FACE EM LOTE</h2>
</div>

<div id="areaBusca" style="width: 100%; max-width: 800px; margin: 0 auto;">
    
    <div class="painel-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
        
        <div class="upload-card" id="boxBase" onclick="document.getElementById('inputBase').click()">
            <input type="file" id="inputBase" accept="image/*" hidden>
            
            <div id="defaultBase" class="upload-content">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#5288c1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                    <circle cx="12" cy="13" r="4"></circle>
                </svg>
                <p>Clique para selecionar a imagem base</p>
            </div>

            <div id="previewBase" class="upload-content" style="display: none;">
                <img id="imgPreviewBase" src="" alt="Imagem Base" class="preview-img-grande">
                <p style="color: #8aa3ba; font-size: 0.85em; margin-top: 10px;">Imagem Selecionada</p>
            </div>
        </div>

        <div class="upload-card" id="boxLote" onclick="document.getElementById('inputLote').click()">
            <input type="file" id="inputLote" accept="image/*" multiple hidden>
            
            <div id="defaultLote" class="upload-content">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#5288c1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="3" y1="9" x2="21" y2="9"></line>
                    <line x1="9" y1="21" x2="9" y2="9"></line>
                </svg>
                <p>Clique para selecionar imagens para comparar</p>
                <span style="font-size: 0.8em; color: #e74c3c; font-weight: bold;">(Máx: 250 arquivos)</span>
            </div>

            <div id="previewLote" class="upload-content" style="display: none;">
                <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                    <span id="badgeMaisFotos" class="mais-fotos-badge" style="display: none;">+0</span>
                    
                    <div id="miniaturasLote" style="display: flex; gap: 5px;"></div>
                </div>
                <p id="txtArquivosSelecionados" style="color: #8aa3ba; font-size: 0.9em; margin-top: 15px;">Arquivos selecionados: 0</p>
            </div>
        </div>
    </div>

    <style>
        .upload-card {
            background: #17212b;
            border: 2px solid #242f3d;
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 180px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .upload-card:hover {
            border-color: #5288c1;
            background: #1a242f;
        }
        .upload-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .upload-content p {
            color: #fff;
            font-weight: 500;
            margin: 15px 0 5px 0;
            font-size: 1.05em;
        }
        
        /* Imagem Base Grande */
        .preview-img-grande {
            width: 120px;
            height: 120px;
            border-radius: 10px;
            object-fit: cover;
            border: 3px solid #5288c1;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Miniaturas do Lote */
        .miniatura-lote {
            width: 65px;
            height: 65px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid #8aa3ba;
        }

        .mais-fotos-badge {
            font-size: 1.2em;
            font-weight: bold;
            color: #8aa3ba;
            margin-right: 5px;
        }
    </style>

    <div style="display: flex; justify-content: center; margin-top: 15px; margin-bottom: 15px;">
        <div class="cf-turnstile" data-sitekey="0x4AAAAAACl3rXFR93fDYsnj" data-theme="dark"></div>
    </div>
    
    <button id="btnComparar" class="btn-power" style="width: 100%; padding: 15px; font-size: 1.1em; background-color: #5288c1; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; margin-bottom: 20px;" onclick="iniciarComparacao()">🚀 Comparar</button>
    
    <div id="loader" class="loader" style="display: none;"></div>
    
    <div id="resultadoContainer" class="resultado-container" style="display: none;">
        <div id="resultado" class="resultado"></div>
    </div>

    <div class="voltar-container-novo">
        <a href="/" class="btn-voltar-novo">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Escolher outro módulo
        </a>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<script src="/static/js/comparador.js?v=100.0"></script>
{% endblock %}
