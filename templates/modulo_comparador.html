{% extends "base.html" %}

{% block content %}

<div class="module-nav-header">
    <a href="/" class="btn-voltar-static">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Dashboard
    </a>
    <div id="dynamic-actions"></div>
</div>

<div class="module-header">
    <h2>📸 SIMILAR FACE EM LOTE</h2>
</div>

<div id="areaBusca" class="full-width max-width-800">
    
    <div class="comparador-grid">
        
        <div class="upload-card" id="boxBase" onclick="document.getElementById('inputBase').click()">
            <input type="file" id="inputBase" accept="image/*" hidden>
            
            <div id="defaultBase" class="upload-content">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#5288c1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                    <circle cx="12" cy="13" r="4"></circle>
                </svg>
                <p>Clique para selecionar a imagem base</p>
            </div>

            <div id="previewBase" class="upload-content is-hidden">
                <img id="imgPreviewBase" alt="Imagem Base" class="preview-img-grande is-hidden">
                <p id="baseSelecionadaLabel">Imagem Selecionada</p>
            </div>
        </div>

        <div class="upload-card" id="boxLote" onclick="document.getElementById('inputLote').click()">
            <input type="file" id="inputLote" accept="image/*" multiple hidden>
            
            <div id="defaultLote" class="upload-content">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#5288c1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="3" y1="9" x2="21" y2="9"></line>
                    <line x1="9" y1="21" x2="9" y2="9"></line>
                </svg>
                <p>Clique para selecionar imagens para comparar</p>
                <span style="font-size: 0.8em; color: #e74c3c; font-weight: bold;">(Máx: 250 arquivos)</span>
            </div>

            <div id="previewLote" class="upload-content is-hidden">
                <div style="display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap;">
                    <span id="badgeMaisFotos" class="mais-fotos-badge is-hidden">+0</span>
                    <div id="miniaturasLote" style="display: flex; gap: 5px; flex-wrap: wrap; justify-content: center;"></div>
                </div>
                <p id="txtArquivosSelecionados" style="color: #8aa3ba; font-size: 0.9em; margin-top: 15px;">Arquivos selecionados: 0</p>
            </div>
        </div>
    </div>

    <div class="turnstile-wrap">
        <div class="cf-turnstile" data-sitekey="0x4AAAAAACl3rXFR93fDYsnj" data-theme="dark"></div>
    </div>
    
    <button id="btnComparar" class="btn-comparar" onclick="iniciarComparacao()">🚀 Comparar</button>
    
    <div id="loader" class="loader"></div>
    
    <div id="resultadoContainer" class="resultado-container">
        <div id="resultado" class="resultado"></div>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<script src="/static/js/comparador.js?v=120.0"></script>
{% endblock %}
