{% extends "base.html" %}

{% block content %}
<div class="module-nav-header">
    <a href="/" class="btn-voltar-static">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Dashboard
    </a>
    <div id="dynamic-actions"></div>
</div>
<div class="module-header">
    <h2>🪪 CONSULTA DE CNH</h2>
</div>

<div id="areaBusca" class="full-width">
    
    <div class="input-group" id="grupoCNH">
        <input type="text" id="cpfInput" placeholder="Digite o CPF (só números)" maxlength="14" autofocus>
        <button id="btnConsultarCNH" onclick="fazerConsultaCNH()">Consultar CNH</button>
    </div>

    <div class="turnstile-wrap">
        <div class="cf-turnstile" data-sitekey="0x4AAAAAACl3rXFR93fDYsnj" data-theme="dark"></div>
    </div>
    
    <div id="loader" class="loader"></div>
    
    <div id="resultadoContainer" class="resultado-container">
        <div id="resultado" class="resultado"></div>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<script src="/static/js/cnh.js?v=117.0"></script>
{% endblock %}
