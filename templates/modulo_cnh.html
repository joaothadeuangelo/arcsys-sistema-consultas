{% extends "base.html" %}

{% block content %}
<div class="module-header">
    <h2>🪪 CONSULTA DE CNH</h2>
</div>

<div id="areaBusca" style="width: 100%;">
    
    <div class="input-group" id="grupoCNH">
        <input type="text" id="cpfInput" placeholder="Digite o CPF (só números)" maxlength="14" autofocus>
        <button id="btnConsultarCNH" onclick="fazerConsultaCNH()">Consultar CNH</button>
    </div>
    
    <div id="loader" class="loader" style="display: none;"></div>
    
    <div id="resultadoContainer" class="resultado-container" style="display: none;">
        <div id="resultado" class="resultado"></div>
        <button class="btn-copiar" onclick="copiarTexto()">📋 Copiar Relatório</button>
    </div>

    <div class="voltar-container-novo">
        <a href="/" class="btn-voltar-novo">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Escolher outro módulo
        </a>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/cnh.js?v=100.0"></script>
{% endblock %}
