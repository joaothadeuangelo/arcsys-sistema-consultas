{% extends "base.html" %}

{% block content %}

<div class="module-nav-header">
    <a href="/" class="btn-voltar-static">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Dashboard
    </a>
    <div id="dynamic-actions"></div>
</div>

<div class="module-header">
    <h2>🧾 CONSULTA DE NOME</h2>
</div>

<div id="areaBuscaNome" style="width: 100%;">
    <div class="input-group" id="grupoNomeBusca">
        <input type="text" id="nomeBuscaInput" placeholder="Digite o nome para consulta" maxlength="80" autofocus>
        <button id="btnConsultarNome" onclick="fazerConsultaNome()">Consultar Nome</button>
    </div>

    <div style="display: flex; justify-content: center; margin-top: 15px; margin-bottom: 15px;">
        <div class="cf-turnstile" data-sitekey="0x4AAAAAACl3rXFR93fDYsnj" data-theme="dark"></div>
    </div>

    <div id="loader" class="loader" style="display: none;"></div>

    <div id="resultadoContainer" class="resultado-container" style="display: none;">
        <div id="resultadoNomeMeta" class="resultado-nome-meta"></div>
        <div id="resultadoNomeLista" class="resultado-nome-lista"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<script src="/static/js/nome.js?v=117.0"></script>
{% endblock %}
